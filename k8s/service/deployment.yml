apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: bizno
spec:
  replicas: 1
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: gervasioartur/auth-service:c716eac
          env:
            - name: DISCOVERY_SERVER_URL
              value: "http://discovery-server:8761/eureka/"
            # ASSUMPTION: confirm the real property/env var name used for
            # spring.config.import: configserver:... and adjust if different.
            - name: CONFIG_SERVER_URL
              value: "http://configserver:8888"
            - name: BROKER_URL
              value: "nats://nats:4222"
            - name: LOKI_URL
              value: "http://loki:3100"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres:5432/bizno_auth"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef: { name: auth-postgres-secret, key: POSTGRES_USER }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef: { name: auth-postgres-secret, key: POSTGRES_PASSWORD }
            - name: SPRING_DATA_REDIS_HOST
              value: "redis"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef: { name: redis-secret, key: REDIS_PASSWORD }
            - name: ZIPKIN_URL
              value: "http://zipkin:9411"
          ports:
            - containerPort: 8081
            - containerPort: 9081
            - containerPort: 9091   # gRPC
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9081
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: bizno
spec:
  selector: { app: auth-service }
  ports:
    - port: 8081
      targetPort: 8081
      name: main
    - port: 9081
      targetPort: 9081
      name: management
    - port: 9091
      targetPort: 9091
      name: grpc
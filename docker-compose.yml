services:
  postgres:
    image: postgres:17.10-alpine
    container_name: bizno-auth-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-bizno_auth}
      - POSTGRES_USER=${POSTGRES_USER:-bizno}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizno} -d ${POSTGRES_DB:-bizno_auth}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bizno-net

  redis:
    image: redis:8.8.0-alpine
    container_name: bizno-auth-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bizno-net

  auth-service:
    build: .
    image: bizno/auth-service:local
    container_name: auth-service
    restart: unless-stopped
    environment:
      - BROKER_URL=nats://bizno-nats:4222
      - DISCOVERY_SERVER_URL=http://discovery-server:8761/eureka/
      # ASSUNÇÃO: confirma o nome real da propriedade/env var usada para
      # spring.config.import: configserver:... e ajusta se for diferente.
      - CONFIG_SERVER_URL=http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bizno_auth}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-bizno}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    ports:
      - "8081:8081"   # main port
      - "9081:9081"   # management port
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bizno-net
    # IMPORTANTE: sobe discovery-server e config-server primeiro
    # (docker compose separados). depends_on não funciona entre stacks.

volumes:
  auth-postgres-data:

networks:
  bizno-net:
    external: true